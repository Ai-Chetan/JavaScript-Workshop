<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>CSI Student Club Registration</h2>
        <p>Join our community of developers!</p>

        <form id="registrationForm">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label for="studentEmail">Email Address</label>
                <input type="text" id="studentEmail" placeholder="student@college.edu">
            </div>

            <div class="input-group">
                <label for="studyYear">Year of Study</label>
                <input type="number" id="studyYear" placeholder="e.g., 1 for First Year" min="1" max="4">
            </div>

            <button type="submit" id="submitBtn">Register</button>
        </form>

        <!-- Messages will appear here -->
        <p id="errorMessage" class="error"></p>
        <p id="successMessage" class="success"></p>
    </div>

    <script src="soln.js"></script>
</body>
</html>
